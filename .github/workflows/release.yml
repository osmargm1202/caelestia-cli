name: Release

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            tag:
                description: "Tag to publish (must exist as a git ref)"
                required: true

# Required so the action can create the release and upload assets.
permissions:
    contents: write

jobs:
    prebuilt-binaries:
        name: Prebuilt binary (${{ matrix.os }}/${{ matrix.arch }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: linux
                      arch: x86_64
                      target: x86_64-unknown-linux-gnu
                      artifact: cli-x86_64-linux
                      binary: target/x86_64-unknown-linux-gnu/release/caelestia
                    # Future: aarch64 via cross/cross-toolchain runners. Disabled
                    # for now — the native linux runner is amd64 and emits x86_64
                    # objects, which the aarch64-linker rejects. Re-enable by
                    # switching this to a `ubuntu-24.04-arm` runner image and
                    # installing `gcc-aarch64-linux-gnu` + `rustup target add
                    # aarch64-unknown-linux-gnu`.
                    # - os: linux
                    #   arch: aarch64
                    #   target: aarch64-unknown-linux-gnu
                    #   artifact: cli-aarch64-linux
                    #   binary: target/aarch64-unknown-linux-gnu/release/caelestia
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Cache cargo
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      target
                  key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-cargo-

            - name: Build release binary
              run: >-
                cargo build --release
                --target "${{ matrix.target }}"
              env:
                  # Force the snapshot tests + golden harness to stay inert on CI
                  # so the build never depends on a PNG file we don't have.
                  CAELESTIA_GOLDEN_DIR: ""

            - name: Stage tarball
              run: |
                  mkdir -p staging/bin staging/share/completions
                  cp "${{ matrix.binary }}" staging/bin/caelestia
                  cp completions/caelestia.fish staging/share/completions/
                  cd staging
                  tar czf ../"${{ matrix.artifact }}.tar.gz" bin share
                  cd ..
                  sha256sum "${{ matrix.artifact }}.tar.gz" | tee "${{ matrix.artifact }}.sha256"

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact }}
                  path: ${{ matrix.artifact }}.tar.gz

    publish:
        name: Publish GitHub release
        needs: prebuilt-binaries
        runs-on: ubuntu-latest
        steps:
            - name: Download artifacts
              uses: actions/download-artifact@v4
              with:
                  path: dist
                  merge-multiple: true

            - name: Compute checksums
              run: |
                  cd dist
                  for f in *.tar.gz; do
                      sha256sum "$f" | tee "${f%.tar.gz}.sha256"
                  done

            - name: Resolve tag
              id: tag
              run: |
                  if [ "${{ github.event_name }}" = "push" ]; then
                      echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
                  else
                      echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
                  fi
              env:
                  GITHUB_REF: ${{ github.ref }}

            - name: Publish release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.tag.outputs.tag }}
                  name: caelestia-cli ${{ steps.tag.outputs.tag }}
                  generate_release_notes: true
                  files: |
                      dist/cli-x86_64-linux.tar.gz
                      dist/cli-x86_64-linux.sha256
